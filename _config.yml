title: "ML Metrics — The Definitive Reference"
description: "The definitive reference guide for selecting and using evaluation metrics in machine learning — with a focus on tensor-level debugging."
baseurl: "/metrics"
url: "https://karam-nus.github.io"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: true

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: false

include:
  - README.md

